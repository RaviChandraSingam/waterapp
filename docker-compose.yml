version: '3.8'

# Local development only — uses npm run dev with hot reload.
# For production deployment, use the Dockerfiles with fly.io (see fly.toml in backend/ and web/).

services:
  db:
    image: postgres:16-alpine
    container_name: waterapp-db
    environment:
      POSTGRES_DB: waterapp
      POSTGRES_USER: waterapp
      POSTGRES_PASSWORD: waterapp_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      # seed.sql is NOT mounted: all data (flats, users, billing history) is restored from
      # waterapp-fixed.sql which preserves the original UUIDs that billing data references.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waterapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: node:20-alpine
    container_name: waterapp-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://waterapp:waterapp_secret@db:5432/waterapp
      JWT_SECRET: waterapp_jwt_secret_change_in_production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm install && npm run dev"

  web:
    image: node:20-alpine
    container_name: waterapp-web
    working_dir: /app
    volumes:
      - ./web:/app
    environment:
      VITE_API_URL: http://backend:3000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev"

volumes:
  pgdata:
