# fly.toml — WaterApp Frontend (React/Vite)
# Deploy with: flyctl deploy (from the web/ directory)

app = "waterapp-web"
primary_region = "sin"   # Singapore — change to nearest region (e.g. "bom" for Mumbai)

[build]
  dockerfile = "Dockerfile"

[env]
  # nginx will proxy /api calls to this URL at runtime.
  # Override with: flyctl secrets set BACKEND_URL=https://waterapp-backend.fly.dev --app waterapp-web
  BACKEND_URL = "https://waterapp-backend.fly.dev"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
