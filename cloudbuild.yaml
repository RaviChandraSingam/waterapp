steps:
  # 1. Build & Push Backend to Cloud Run
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/water-backend', '.']
    dir: 'backend'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/water-backend']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'water-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/water-backend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'DATABASE_URL=${_DATABASE_URL}'

  # 2. Build & Deploy Frontend to Firebase Hosting
  - name: 'node:20'
    entrypoint: 'npm'
    dir: 'web'
    args: ['install']
  - name: 'node:20'
    entrypoint: 'npm'
    dir: 'web'
    args: ['run', 'build']
  - name: 'gcr.io/$PROJECT_ID/firebase'
    args: ['deploy', '--only', 'hosting']

images:
  - 'gcr.io/$PROJECT_ID/water-backend'

substitutions:
  _DATABASE_URL: 'your_supabase_connection_string'
