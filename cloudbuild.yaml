steps:
  # 1. Build & Push Backend to Cloud Run
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/app-repo/water-backend', '.']
    dir: 'backend'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/app-repo/water-backend']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'water-backend'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/app-repo/water-backend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'DATABASE_URL=${_DATABASE_URL}'

  # 2. Build & Deploy Frontend to Firebase Hosting
  - name: 'node:20'
    entrypoint: 'npm'
    dir: 'web'
    args: ['install']
  - name: 'node:20'
    entrypoint: 'npm'
    dir: 'web'
    args: ['run', 'build']
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'npx --yes firebase-tools@latest deploy --only hosting --project waterapp-prod-492407 --non-interactive'
    env:
      - 'HOME=/root'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/app-repo/water-backend'

substitutions:
  _DATABASE_URL: 'postgresql://postgres.ltpmqvpjdaskutmaijle:REDACTED@aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres'
